<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <h1>EXPENSE TRACKER</h1>
    </header>
    <div class="Dashboard-Cards">
        <div class="card balance">
            <p>Balance</p>
            <p>$0.00</p>
        </div>
        <div class="card income">
            <p>Income</p>
            <p>$0.00</p>
        </div>
        <div class="card expense">
            <p>Expense</p>
            <p>$0.00</p>
        </div>
    </div>
    <div class="form">
        <span>Add new transaction</span>
        <form action="">
            <div class="title">
                <label for="text">Enter Text</label>
                <input type="text" id="title-input" placeholder="Title">
            </div>
            <div class="amount-div">
                <label for="amount">Enter Amount</label>
                <input type="number" id="amount" placeholder=" Amount">
            </div>
            <div class="category-div">
                <label for="category">Select Category</label>
                <select id="category">
                    <option value="" disabled selected>Select Category</option>
                    <option value="Food">Food</option>
                    <option value="Transport">Transport</option>
                    <option value="Entertainment">Entertainment</option>
                    <option value="Salary">Salary</option>
                    <option value="Others">Others</option>
                </select>
            </div>
            <div class="type">
                <div><input type="radio" name="type" id="income" value="income">
                    <label for="income">Income</label>
                </div>
                <div><input type="radio" name="type" id="expense" value="expense">
                    <label for="expense">Expense</label>
                </div>
            </div>
            <div class="date-div">
                <label for="date">Date</label>
                <input type="date" id="date">
            </div>
            <button class="btn" type="submit">Add transaction</button>
        </form>
    </div>
    <div class="transactions">
        <h3>History</h3>
        <div class="search">
            <label for="filter"><i class="fa fa-search"></i>Search</label>
            <input type="text" id="filter" placeholder="Search...">
        </div>
        <table>
            <tr>
                <th>Title</th>
                <th>Amount</th>
                <th>Category</th>
                <th>Date</th>
                <th>Actions</th>
            </tr>
            <tbody id="transactions-body"></tbody>
    </div>
    <div class="statistics">
        <h3>Statistics</h3>

        <p id="top-category">Top Category : None</p>

        <p id="total-transactions">
            Total Transactions : 0
        </p>

        <p id="highest-expense">
            Highest Expense : $0
        </p>

        <p id="highest-income">
            Highest Income : $0
        </p>
    </div>
    <script src="main.js"></script>
</body>

</html>
